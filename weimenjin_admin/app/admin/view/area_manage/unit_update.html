<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑单元</title>
    <link rel="stylesheet" href="/static/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/css/font-awesome.min.css">
    <link rel="stylesheet" href="/static/css/animate.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="gray-bg">
    <div class="wrapper wrapper-content animated fadeInRight">
        <div class="row">
            <div class="col-sm-12">
                <div class="ibox float-e-margins">
                    <div class="ibox-content">
                        <form class="form-horizontal" id="unitForm">
                            <input type="hidden" name="unit_id" value="{$info.unit_id}">
                            <div class="form-group">
                                <label class="col-sm-3 control-label"><span class="text-danger">*</span> 所属楼栋：</label>
                                <div class="col-sm-8">
                                    <select class="form-control" name="building_id" required>
                                        <option value="">请选择楼栋</option>
                                        {volist name="buildings" id="vo"}
                                        <option value="{$vo.building_id}" {$vo.building_id==$info.building_id?'selected':''}>{$vo.area_name} - {$vo.building_name}</option>
                                        {/volist}
                                    </select>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label"><span class="text-danger">*</span> 单元名称：</label>
                                <div class="col-sm-8">
                                    <input type="text" class="form-control" name="unit_name" value="{$info.unit_name}" placeholder="请输入单元名称" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">单元编码：</label>
                                <div class="col-sm-8">
                                    <input type="text" class="form-control" name="unit_code" value="{$info.unit_code}" placeholder="单元编码">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">楼层数：</label>
                                <div class="col-sm-8">
                                    <input type="number" class="form-control" name="floors" value="{$info.floors}" placeholder="请输入楼层数">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">房间数：</label>
                                <div class="col-sm-8">
                                    <input type="number" class="form-control" name="room_count" value="{$info.room_count}" placeholder="请输入房间数">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">备注说明：</label>
                                <div class="col-sm-8">
                                    <textarea class="form-control" name="description" rows="3" placeholder="请输入备注说明">{$info.description}</textarea>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">状态：</label>
                                <div class="col-sm-8">
                                    <select class="form-control" name="status">
                                        <option value="1" {$info.status==1?'selected':''}>启用</option>
                                        <option value="0" {$info.status==0?'selected':''}>禁用</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-group">
                                <div class="col-sm-8 col-sm-offset-3">
                                    <button type="submit" class="btn btn-primary">提交</button>
                                    <button type="button" class="btn btn-white" onclick="parent.layer.closeAll()">取消</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/jquery.min.js"></script>
    <script src="/static/js/bootstrap.min.js"></script>
    <script src="/static/js/plugins/layer/layer.min.js"></script>
    <script>
    $(function() {
        $('#unitForm').submit(function(e) {
            e.preventDefault();

            $.post('/admin/AreaManage/unitUpdate', $(this).serialize(), function(res) {
                if (res.status == '00') {
                    parent.layer.msg('更新成功');
                    setTimeout(function() {
                        parent.layer.closeAll();
                    }, 1000);
                } else {
                    layer.msg(res.msg);
                }
            });
        });
    });
    </script>
</body>
</html>
