<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加区域</title>
    <link rel="stylesheet" href="/static/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/css/font-awesome.min.css">
    <link rel="stylesheet" href="/static/css/animate.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="gray-bg">
    <div class="wrapper wrapper-content animated fadeInRight">
        <div class="row">
            <div class="col-sm-12">
                <div class="ibox float-e-margins">
                    <div class="ibox-content">
                        <form class="form-horizontal" id="areaForm">
                            <div class="form-group">
                                <label class="col-sm-3 control-label"><span class="text-danger">*</span> 区域名称：</label>
                                <div class="col-sm-8">
                                    <input type="text" class="form-control" name="area_name" placeholder="请输入区域名称" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">区域编码：</label>
                                <div class="col-sm-8">
                                    <input type="text" class="form-control" name="area_code" placeholder="请输入区域编码">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">省份：</label>
                                <div class="col-sm-8">
                                    <input type="text" class="form-control" name="province" placeholder="请输入省份">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">城市：</label>
                                <div class="col-sm-8">
                                    <input type="text" class="form-control" name="city" placeholder="请输入城市">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">区县：</label>
                                <div class="col-sm-8">
                                    <input type="text" class="form-control" name="district" placeholder="请输入区县">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">详细地址：</label>
                                <div class="col-sm-8">
                                    <textarea class="form-control" name="address" rows="2" placeholder="请输入详细地址"></textarea>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">联系人：</label>
                                <div class="col-sm-8">
                                    <input type="text" class="form-control" name="contact_name" placeholder="请输入联系人姓名">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">联系电话：</label>
                                <div class="col-sm-8">
                                    <input type="text" class="form-control" name="contact_phone" placeholder="请输入联系电话">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">备注说明：</label>
                                <div class="col-sm-8">
                                    <textarea class="form-control" name="description" rows="3" placeholder="请输入备注说明"></textarea>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">状态：</label>
                                <div class="col-sm-8">
                                    <select class="form-control" name="status">
                                        <option value="1">启用</option>
                                        <option value="0">禁用</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-group">
                                <div class="col-sm-8 col-sm-offset-3">
                                    <button type="submit" class="btn btn-primary">提交</button>
                                    <button type="button" class="btn btn-white" onclick="parent.layer.closeAll()">取消</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/jquery.min.js"></script>
    <script src="/static/js/bootstrap.min.js"></script>
    <script src="/static/js/plugins/layer/layer.min.js"></script>
    <script>
    $(function() {
        $('#areaForm').submit(function(e) {
            e.preventDefault();

            $.post('/admin/AreaManage/add', $(this).serialize(), function(res) {
                if (res.status == '00') {
                    parent.layer.msg('添加成功');
                    setTimeout(function() {
                        parent.layer.closeAll();
                    }, 1000);
                } else {
                    layer.msg(res.msg);
                }
            });
        });
    });
    </script>
</body>
</html>
