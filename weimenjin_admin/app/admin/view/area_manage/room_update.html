<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑房号</title>
    <link rel="stylesheet" href="/static/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/css/font-awesome.min.css">
    <link rel="stylesheet" href="/static/css/animate.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="gray-bg">
    <div class="wrapper wrapper-content animated fadeInRight">
        <div class="row">
            <div class="col-sm-12">
                <div class="ibox float-e-margins">
                    <div class="ibox-content">
                        <form class="form-horizontal" id="roomForm">
                            <input type="hidden" name="room_id" value="{$info.room_id}">
                            <div class="form-group">
                                <label class="col-sm-3 control-label"><span class="text-danger">*</span> 所属单元：</label>
                                <div class="col-sm-8">
                                    <select class="form-control" name="unit_id" required>
                                        <option value="">请选择单元</option>
                                        {volist name="units" id="vo"}
                                        <option value="{$vo.unit_id}" {$vo.unit_id==$info.unit_id?'selected':''}>{$vo.area_name} - {$vo.building_name} - {$vo.unit_name}</option>
                                        {/volist}
                                    </select>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label"><span class="text-danger">*</span> 房号：</label>
                                <div class="col-sm-8">
                                    <input type="text" class="form-control" name="room_number" value="{$info.room_number}" placeholder="请输入房号" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">房号编码：</label>
                                <div class="col-sm-8">
                                    <input type="text" class="form-control" name="room_code" value="{$info.room_code}" placeholder="房号编码">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">楼层：</label>
                                <div class="col-sm-8">
                                    <input type="number" class="form-control" name="floor" value="{$info.floor}" placeholder="请输入楼层">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">房间类型：</label>
                                <div class="col-sm-8">
                                    <select class="form-control" name="room_type">
                                        <option value="residential" {$info.room_type=='residential'?'selected':''}>住宅</option>
                                        <option value="commercial" {$info.room_type=='commercial'?'selected':''}>商业</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">面积(㎡)：</label>
                                <div class="col-sm-8">
                                    <input type="number" step="0.01" class="form-control" name="area_size" value="{$info.area_size}" placeholder="请输入面积">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">业主姓名：</label>
                                <div class="col-sm-8">
                                    <input type="text" class="form-control" name="owner_name" value="{$info.owner_name}" placeholder="请输入业主姓名">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">业主电话：</label>
                                <div class="col-sm-8">
                                    <input type="text" class="form-control" name="owner_phone" value="{$info.owner_phone}" placeholder="请输入业主电话">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">备注说明：</label>
                                <div class="col-sm-8">
                                    <textarea class="form-control" name="description" rows="3" placeholder="请输入备注说明">{$info.description}</textarea>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-sm-3 control-label">状态：</label>
                                <div class="col-sm-8">
                                    <select class="form-control" name="status">
                                        <option value="1" {$info.status==1?'selected':''}>启用</option>
                                        <option value="0" {$info.status==0?'selected':''}>禁用</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-group">
                                <div class="col-sm-8 col-sm-offset-3">
                                    <button type="submit" class="btn btn-primary">提交</button>
                                    <button type="button" class="btn btn-white" onclick="parent.layer.closeAll()">取消</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/jquery.min.js"></script>
    <script src="/static/js/bootstrap.min.js"></script>
    <script src="/static/js/plugins/layer/layer.min.js"></script>
    <script>
    $(function() {
        $('#roomForm').submit(function(e) {
            e.preventDefault();

            $.post('/admin/AreaManage/roomUpdate', $(this).serialize(), function(res) {
                if (res.status == '00') {
                    parent.layer.msg('更新成功');
                    setTimeout(function() {
                        parent.layer.closeAll();
                    }, 1000);
                } else {
                    layer.msg(res.msg);
                }
            });
        });
    });
    </script>
</body>
</html>
