{extend name='common/_container'}
{block name="content"}
<div class="row">
    <div class="col-sm-12">
        <div class="ibox float-e-margins">
            <div class="ibox-title">
                <h5>单元管理</h5>
                <button style="float:right; margin-top:-10px;" title="刷新页面" type="button" class="btn btn-default btn-outline" onclick="window.location.reload()">
                    <i class="fa fa-refresh"></i>
                </button>
            </div>
            <div class="ibox-content">
                <div class="row row-lg">
                    <div class="col-sm-12">
                        <div class="row" id="searchGroup">
                            <div class="col-sm-3">
                                <div class="input-group">
                                    <div class="input-group-btn">
                                        <button class="btn btn-white dropdown-toggle" type="button">所属楼栋</button>
                                    </div>
                                    <select class="form-control" id="building_id">
                                        <option value="">全部楼栋</option>
                                        {volist name="buildings" id="building"}
                                        <option value="{$building.building_id}">{$building.area_name} - {$building.building_name}</option>
                                        {/volist}
                                    </select>
                                </div>
                            </div>
                            <div class="col-sm-3">
                                <div class="input-group">
                                    <div class="input-group-btn">
                                        <button class="btn btn-white dropdown-toggle" type="button">关键词</button>
                                    </div>
                                    <input type="text" class="form-control" id="keyword" placeholder="单元名称或编码" />
                                </div>
                            </div>
                            <div class="col-sm-2">
                                <button type="button" class="btn btn-primary" onclick="UnitManager.search()">
                                    <i class="fa fa-search"></i>&nbsp;搜索
                                </button>
                            </div>
                        </div>
                        <div class="btn-group-sm" id="UnitTableToolbar" role="group">
                            <button type="button" class="btn btn-primary button-margin" onclick="UnitManager.add()">
                                <i class="fa fa-plus"></i>&nbsp;添加单元
                            </button>
                            <button type="button" class="btn btn-success button-margin" onclick="UnitManager.update()">
                                <i class="fa fa-pencil"></i>&nbsp;修改
                            </button>
                            <button type="button" class="btn btn-danger button-margin" onclick="UnitManager.delete()">
                                <i class="fa fa-trash"></i>&nbsp;删除
                            </button>
                        </div>
                        <table id="UnitTable" data-mobile-responsive="true"></table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
var UnitManager = {
    table: null,

    init: function() {
        this.initTable();
    },

    initTable: function() {
        this.table = $('#UnitTable').bootstrapTable({
            url: '/admin/AreaManage/unitIndex',
            method: 'get',
            dataType: 'json',
            pagination: true,
            sidePagination: 'server',
            pageSize: 20,
            pageList: [10, 20, 50, 100],
            queryParams: function(params) {
                return {
                    limit: params.limit,
                    offset: params.offset,
                    building_id: $('#building_id').val(),
                    keyword: $('#keyword').val()
                };
            },
            columns: [{
                checkbox: true
            }, {
                field: 'unit_id',
                title: 'ID',
                width: '60px'
            }, {
                field: 'area_name',
                title: '所属区域',
                width: '120px'
            }, {
                field: 'building_name',
                title: '所属楼栋',
                width: '120px'
            }, {
                field: 'unit_name',
                title: '单元名称',
                width: '120px'
            }, {
                field: 'unit_code',
                title: '单元编码',
                width: '100px'
            }, {
                field: 'floors',
                title: '楼层数',
                width: '80px'
            }, {
                field: 'room_count',
                title: '房号数',
                width: '80px'
            }, {
                field: 'status',
                title: '状态',
                width: '80px',
                formatter: function(value) {
                    return value == 1 ? '<span class="label label-primary">启用</span>' : '<span class="label label-default">禁用</span>';
                }
            }]
        });
    },

    search: function() {
        this.table.bootstrapTable('refresh');
    },

    add: function() {
        layer.open({
            type: 2,
            title: '添加单元',
            shadeClose: false,
            shade: 0.8,
            area: ['700px', '75%'],
            content: '/admin/AreaManage/unitAdd',
            end: function() {
                UnitManager.search();
            }
        });
    },

    update: function() {
        var rows = this.table.bootstrapTable('getSelections');
        if (rows.length == 0) {
            layer.msg('请选择一条记录');
            return;
        }
        if (rows.length > 1) {
            layer.msg('只能选择一条记录');
            return;
        }

        layer.open({
            type: 2,
            title: '修改单元',
            shadeClose: false,
            shade: 0.8,
            area: ['700px', '75%'],
            content: '/admin/AreaManage/unitUpdate?unit_id=' + rows[0].unit_id,
            end: function() {
                UnitManager.search();
            }
        });
    },

    delete: function() {
        var rows = this.table.bootstrapTable('getSelections');
        if (rows.length == 0) {
            layer.msg('请选择要删除的记录');
            return;
        }

        layer.confirm('确定要删除选中的单元吗？', {
            btn: ['确定', '取消']
        }, function(index) {
            var unit_id = rows[0].unit_id;
            $.post('/admin/AreaManage/unitDelete', {unit_id: unit_id}, function(res) {
                if (res.status == '00') {
                    layer.msg('删除成功');
                    UnitManager.search();
                } else {
                    layer.msg(res.msg);
                }
            });
            layer.close(index);
        });
    }
};

$(function() {
    UnitManager.init();
});
</script>
{/block}
