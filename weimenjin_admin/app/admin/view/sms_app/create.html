<?php
$existingApp = \app\module\model\UserSmsApp::where('user_id', session('user_id'))->find();
?>

{extend name='common/_container'}
{block name="content"}
<div class="row">
    <div class="col-sm-6 col-sm-offset-3">
        <div class="ibox float-e-margins">
            <div class="ibox-title">
                <h5>生成短信服务AppID和AppSecret</h5>
            </div>
            <div class="ibox-content">
                {if condition="$existingApp"}
                <p class="text-center">您已生成过AppID和AppSecret，不能重复生成。</p>
                {else /}
                <form class="form-horizontal" method="post" action="{:url('SmsApp/create')}">
                    <div class="form-group">
                        <label class="col-sm-3 control-label">用户ID:</label>
                        <div class="col-sm-9">
                            <input type="text" class="form-control" name="user_id" required>
                        </div>
                    </div>
                    <div class="form-group text-center">
                        <div class="col-sm-offset-3 col-sm-9">
                            <button type="submit" class="btn btn-primary">生成</button>
                            <button type="button" class="btn btn-default" onclick="history.back();">取消</button>
                        </div>
                    </div>
                </form>
                {/if}
            </div>
        </div>
    </div>
</div>
<script>
    $('form').on('submit', function(e) {
        e.preventDefault();
        $.post($(this).attr('action'), $(this).serialize(), function(data) {
            if (data.code === 1) {
                alert('生成成功');
                window.location.href = '{:url("SmsApp/index")}';
            } else {
                alert(data.msg);
            }
        });
    });
</script>
{/block}
