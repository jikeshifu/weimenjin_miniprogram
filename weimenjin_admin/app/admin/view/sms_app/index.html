{extend name='common/_container'}
{block name="content"}
<div class="row">
    <div class="col-sm-6 col-sm-offset-3">
        <div class="ibox float-e-margins">
            <div class="ibox-title">
                <h5>短信服务管理</h5>
            </div>
            <div class="ibox-content">
                <div class="form-group">
                    <label>App ID:</label>
                    <input type="text" class="form-control" value="{$smsapi.appid}" readonly>
                </div>
                <div class="form-group">
                    <label>App Secret:</label>
                    <input type="text" class="form-control" value="{$smsapi.appsecret}" readonly>
                </div>
                <div class="form-group">
                    <label>余额:</label>
                    <input type="text" class="form-control" value="{$smsapi.balance|number_format=2}" readonly>
                </div>
                <div class="text-center">
                    <button class="btn btn-primary" onclick="copyToClipboard('{$smsapi.appid}')">复制 App ID</button>
                    <button class="btn btn-primary" onclick="copyToClipboard('{$smsapi.appsecret}')">复制 App Secret</button>
                </div>
                <hr>
                <div class="form-group">
                    <label>选择充值金额:</label>
                    <div>
                        <label class="radio-inline">
                            <input type="radio" name="amount" value="1" > 1 元
                        </label>
                        <label class="radio-inline">
                            <input type="radio" name="amount" value="100" checked> 100 元
                        </label>
                        <label class="radio-inline">
                            <input type="radio" name="amount" value="200"> 200 元
                        </label>
                        <label class="radio-inline">
                            <input type="radio" name="amount" value="300"> 300 元
                        </label>
                        <label class="radio-inline">
                            <input type="radio" name="amount" value="500"> 500 元
                        </label>
                    </div>
                </div>
                <div class="form-group text-center">
                    <label>微信扫码充值:支付后刷新页面</label>
                    <div>
                        <img id="qrcode" src="{$qrcode_url}" alt="微信扫码充值" style="width: 200px; height: 200px;">
                    </div>
                    <p class="text-muted">使用微信扫码进行充值，充值金额将直接增加到您的余额中。</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function copyToClipboard(text) {
        const tempInput = document.createElement("input");
        document.body.appendChild(tempInput);
        tempInput.value = text;
        tempInput.select();
        document.execCommand("copy");
        document.body.removeChild(tempInput);
        alert('已复制到剪贴板');
    }

    $(document).ready(function() {
        generateQrcode();

        $('input[name="amount"]').change(function() {
            generateQrcode();
        });
    });

    function generateQrcode() {
        var amount = $('input[name="amount"]:checked').val();
        var appid = '{$smsapi.appid}';
        $.post(Feng.ctxPath + "/SmsApp/generateQrcode", {amount: amount, appid: appid}, function(data) {
            if (data.status === 'success') {
                // 更新二维码图片的 src 属性，并防止缓存
                $('#qrcode').attr('src', data.qrcode_url + '?' + Math.random());
                Feng.success('请选择微信扫码支付充值' + amount + '元');
            } else {
                Feng.error('生成二维码失败');
            }
        }, 'json');
    }
</script>
{/block}
