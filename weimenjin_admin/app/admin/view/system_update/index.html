{extend name='common/_container'}
{block name="content"}
<div class="row">
    <div class="col-sm-12">
        <div class="ibox float-e-margins">
            <div class="ibox-title">
                <h5>系统在线更新</h5>
            </div>
            <div class="ibox-content">
                <div class="alert alert-info">
                    当前版本：<strong>{$currentVersion}</strong>。系统会从演示平台自动检测最新更新包，升级前会自动备份代码和数据库。
                </div>
                <div class="form-horizontal">
                    <div class="form-group">
                        <label class="col-sm-2 control-label">更新源</label>
                        <div class="col-sm-8">
                            <input type="text" id="manifest_url" class="form-control" value="{$manifestUrl}">
                            <span class="help-block m-b-none">默认使用微门禁开源演示平台更新源，正常情况下无需修改。</span>
                        </div>
                    </div>
                    <div id="advanced-update" style="display:none;">
                        <div class="form-group">
                            <label class="col-sm-2 control-label">更新包地址</label>
                            <div class="col-sm-8">
                                <input type="text" id="package_url" class="form-control" placeholder="可选，手动指定 zip 更新包">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="col-sm-2 control-label">SHA256</label>
                            <div class="col-sm-8">
                                <input type="text" id="sha256" class="form-control" placeholder="可选，填写后会校验更新包完整性">
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <div class="col-sm-offset-2 col-sm-8">
                            <button class="btn btn-primary" onclick="Updater.check()"><i class="fa fa-search"></i> 检测更新</button>
                            <button class="btn btn-danger" id="install-btn" onclick="Updater.install()" disabled><i class="fa fa-cloud-download"></i> 立即升级</button>
                            <button class="btn btn-info" onclick="Updater.databaseCheck()"><i class="fa fa-database"></i> 检测数据库</button>
                            <button class="btn btn-warning" onclick="Updater.databaseRepair()"><i class="fa fa-wrench"></i> 修复数据库</button>
                            <button class="btn btn-default" onclick="Updater.logs()"><i class="fa fa-list"></i> 查看日志</button>
                            <button class="btn btn-link" onclick="Updater.toggleAdvanced()">高级设置</button>
                        </div>
                    </div>
                </div>
                <style>
                    .update-result-panel {
                        display: none;
                        max-height: 420px;
                        overflow: auto;
                        border: 1px solid #e5e6e7;
                        border-radius: 4px;
                        background: #fff;
                        padding: 18px 20px;
                    }
                    .update-result-title {
                        margin: 0 0 14px;
                        font-size: 16px;
                        font-weight: 600;
                        color: #2f4050;
                    }
                    .update-summary {
                        display: grid;
                        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
                        gap: 12px;
                        margin-bottom: 14px;
                    }
                    .update-summary-item {
                        border: 1px solid #eef0f3;
                        border-radius: 4px;
                        padding: 12px 14px;
                        background: #f9fbfc;
                    }
                    .update-summary-label {
                        margin-bottom: 6px;
                        color: #8a95a5;
                        font-size: 12px;
                    }
                    .update-summary-value {
                        color: #2f4050;
                        word-break: break-all;
                    }
                    .update-status-ok {
                        color: #1ab394;
                        font-weight: 600;
                    }
                    .update-status-warn {
                        color: #f8ac59;
                        font-weight: 600;
                    }
                    .update-log-list {
                        margin: 0;
                        padding: 0;
                        list-style: none;
                    }
                    .update-log-list li {
                        padding: 10px 0;
                        border-bottom: 1px solid #f0f0f0;
                        line-height: 1.7;
                    }
                    .update-log-list li:last-child {
                        border-bottom: 0;
                    }
                    .update-progress {
                        display: none;
                        margin-bottom: 16px;
                        border: 1px solid #dce8f1;
                        border-radius: 4px;
                        background: #f7fbfe;
                        padding: 16px 18px;
                    }
                    .update-progress-head {
                        display: flex;
                        justify-content: space-between;
                        align-items: center;
                        margin-bottom: 10px;
                        color: #2f4050;
                        font-weight: 600;
                    }
                    .update-progress-tip {
                        margin-top: 10px;
                        color: #7a8699;
                    }
                    .update-step-list {
                        display: grid;
                        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                        gap: 8px;
                        margin-top: 12px;
                    }
                    .update-step {
                        color: #9aa5b1;
                        font-size: 12px;
                    }
                    .update-step.active {
                        color: #1c84c6;
                        font-weight: 600;
                    }
                    .update-step.done {
                        color: #1ab394;
                    }
                </style>
                <div id="update-progress" class="update-progress"></div>
                <div id="update-result" class="update-result-panel"></div>
            </div>
        </div>
    </div>
</div>
<script>
    var Updater = {};
    Updater.latest = null;
    Updater.progressTimer = null;
    Updater.progressStartedAt = 0;
    Updater.progressSteps = [
        {percent: 8, text: '连接更新源'},
        {percent: 18, text: '下载更新包'},
        {percent: 30, text: '校验更新包'},
        {percent: 45, text: '备份代码和数据库'},
        {percent: 60, text: '解压并覆盖文件'},
        {percent: 76, text: '执行数据库脚本'},
        {percent: 88, text: '清理缓存'},
        {percent: 96, text: '等待服务器返回结果'}
    ];
    Updater.params = function () {
        return {
            manifest_url: $('#manifest_url').val(),
            package_url: $('#package_url').val(),
            sha256: $('#sha256').val()
        };
    };
    Updater.escape = function (text) {
        return $('<div>').text(text === undefined || text === null ? '' : String(text)).html();
    };
    Updater.summaryItem = function (label, value, extraClass) {
        return '<div class="update-summary-item">'
            + '<div class="update-summary-label">' + Updater.escape(label) + '</div>'
            + '<div class="update-summary-value ' + (extraClass || '') + '">' + Updater.escape(value || '-') + '</div>'
            + '</div>';
    };
    Updater.renderCheck = function (info) {
        var statusText = info.has_update ? '发现可升级版本' : '当前已是最新版本';
        var statusClass = info.has_update ? 'update-status-warn' : 'update-status-ok';
        var html = '<h4 class="update-result-title">检测结果</h4><div class="update-summary">'
            + Updater.summaryItem('当前版本', info.current_version)
            + Updater.summaryItem('最新版本', info.latest_version)
            + Updater.summaryItem('更新状态', statusText, statusClass)
            + Updater.summaryItem('是否强制升级', info.force ? '是' : '否')
            + Updater.summaryItem('更新包地址', info.package_url)
            + Updater.summaryItem('更新源', info.manifest_url)
            + '</div>';
        if (info.notes) {
            html += '<div class="alert alert-info m-b-none"><strong>更新说明：</strong>' + Updater.escape(info.notes) + '</div>';
        }
        return html;
    };
    Updater.renderInstall = function (result) {
        var backup = result.backup || {};
        var sql = result.sql || {};
        return '<h4 class="update-result-title">升级结果</h4><div class="update-summary">'
            + Updater.summaryItem('升级版本', result.version)
            + Updater.summaryItem('完成时间', result.time)
            + Updater.summaryItem('代码备份', backup.code)
            + Updater.summaryItem('数据库备份', backup.database)
            + Updater.summaryItem('数据库脚本', sql.file || '无需执行')
            + Updater.summaryItem('执行语句数', sql.statements === undefined ? '0' : sql.statements)
            + '</div><div class="alert alert-success m-b-none">升级已完成，系统缓存已清理。</div>';
    };
    Updater.renderLogs = function (logs) {
        logs = $.trim(logs || '');
        if (!logs) {
            return '<h4 class="update-result-title">更新日志</h4><div class="alert alert-info m-b-none">暂无更新日志。</div>';
        }
        var items = logs.split(/\r?\n/).filter(function (line) {
            return $.trim(line) !== '';
        }).map(function (line) {
            var text = line;
            var match = line.match(/更新完成:\s*(\{.*\})$/);
            if (match) {
                try {
                    var data = JSON.parse(match[1]);
                    text = '更新完成，版本：' + (data.version || '-')
                        + '，完成时间：' + (data.time || '-')
                        + '，代码备份：' + ((data.backup || {}).code || '-')
                        + '，数据库备份：' + ((data.backup || {}).database || '-');
                } catch (e) {}
            }
            return '<li>' + Updater.escape(text) + '</li>';
        }).join('');
        return '<h4 class="update-result-title">更新日志</h4><ul class="update-log-list">' + items + '</ul>';
    };
    Updater.renderDatabaseStatus = function (status) {
        var missing = status.missing || [];
        var statusText = missing.length ? '发现异常项目，建议点击“修复数据库”' : '数据库结构正常';
        var statusClass = missing.length ? 'update-status-warn' : 'update-status-ok';
        var html = '<h4 class="update-result-title">数据库结构检测</h4><div class="update-summary">'
            + Updater.summaryItem('检测时间', status.checked_at)
            + Updater.summaryItem('检测项目', status.total)
            + Updater.summaryItem('正常项目', status.ok_count)
            + Updater.summaryItem('异常项目', status.missing_count)
            + Updater.summaryItem('检测结果', statusText, statusClass)
            + '</div>';
        if (missing.length) {
            html += '<ul class="update-log-list">';
            $.each(missing, function (_, item) {
                html += '<li><span class="update-status-warn">' + Updater.escape(item.status || '异常') + '</span>：'
                    + Updater.escape(item.label) + '（' + Updater.escape(item.column ? item.table + '.' + item.column : item.table) + '）</li>';
            });
            html += '</ul>';
        } else {
            html += '<div class="alert alert-success m-b-none">关键数据库表已完整，无需修复。</div>';
        }
        return html;
    };
    Updater.renderDatabaseRepair = function (result) {
        var before = result.before || {};
        var after = result.after || {};
        var html = '<h4 class="update-result-title">数据库结构修复结果</h4><div class="update-summary">'
            + Updater.summaryItem('修复时间', result.time)
            + Updater.summaryItem('执行语句数', result.statements)
            + Updater.summaryItem('修复前异常', before.missing_count)
            + Updater.summaryItem('修复后异常', after.missing_count)
            + Updater.summaryItem('修复结果', after.missing_count > 0 ? '仍有项目需人工检查' : '已修复完成', after.missing_count > 0 ? 'update-status-warn' : 'update-status-ok')
            + '</div>';
        html += Updater.renderDatabaseStatus(after);
        return html;
    };
    Updater.showHtml = function (html) {
        $('#update-result').show().html(html);
    };
    Updater.showText = function (text) {
        $('#update-result').show().html('<h4 class="update-result-title">操作提示</h4><div class="alert alert-warning m-b-none">' + Updater.escape(text) + '</div>');
    };
    Updater.renderProgress = function (percent, text) {
        var elapsed = Updater.progressStartedAt ? Math.floor((Date.now() - Updater.progressStartedAt) / 1000) : 0;
        var longWaitTip = elapsed >= 45 ? '更新仍在执行，可能正在备份数据库或覆盖文件，请继续等待，不要关闭页面。' : '升级过程中请不要刷新或关闭页面。';
        var steps = Updater.progressSteps.map(function (step) {
            var cls = percent > step.percent ? 'done' : (text === step.text ? 'active' : '');
            var icon = percent > step.percent ? 'fa-check-circle' : (text === step.text ? 'fa-spinner fa-spin' : 'fa-circle-o');
            return '<div class="update-step ' + cls + '"><i class="fa ' + icon + '"></i> ' + Updater.escape(step.text) + '</div>';
        }).join('');
        $('#update-progress').show().html(
            '<div class="update-progress-head">'
            + '<span><i class="fa fa-cloud-download"></i> 正在升级系统</span>'
            + '<span>' + percent + '%</span>'
            + '</div>'
            + '<div class="progress progress-striped active m-b-xs">'
            + '<div class="progress-bar progress-bar-info" style="width:' + percent + '%"></div>'
            + '</div>'
            + '<div class="update-progress-tip">当前步骤：' + Updater.escape(text) + '，已等待 ' + elapsed + ' 秒。' + longWaitTip + '</div>'
            + '<div class="update-step-list">' + steps + '</div>'
        );
    };
    Updater.startProgress = function () {
        var index = 0;
        Updater.stopProgress(false);
        Updater.progressStartedAt = Date.now();
        Updater.renderProgress(Updater.progressSteps[0].percent, Updater.progressSteps[0].text);
        Updater.progressTimer = setInterval(function () {
            if (index < Updater.progressSteps.length - 1) {
                index++;
            }
            var step = Updater.progressSteps[index];
            Updater.renderProgress(step.percent, step.text);
        }, 4500);
    };
    Updater.stopProgress = function (completed) {
        if (Updater.progressTimer) {
            clearInterval(Updater.progressTimer);
            Updater.progressTimer = null;
        }
        if (completed) {
            Updater.renderProgress(100, '升级完成');
            setTimeout(function () {
                $('#update-progress').fadeOut(300);
            }, 1200);
        } else {
            $('#update-progress').hide().empty();
        }
    };
    Updater.toggleAdvanced = function () {
        $('#advanced-update').toggle();
    };
    Updater.check = function () {
        $('#install-btn').prop('disabled', true);
        var ajax = new $ax(Feng.ctxPath + '/SystemUpdate/check', function (data) {
            if (data.status === '00') {
                Updater.latest = data.data || {};
                $('#package_url').val(Updater.latest.package_url || '');
                $('#sha256').val(Updater.latest.sha256 || '');
                $('#manifest_url').val(Updater.latest.manifest_url || $('#manifest_url').val());
                if (Updater.latest.has_update) {
                    Feng.success('检测到新版本：' + Updater.latest.latest_version);
                    $('#install-btn').prop('disabled', false);
                } else {
                    Feng.success('当前已是最新版本');
                }
                Updater.showHtml(Updater.renderCheck(Updater.latest));
            } else {
                Feng.error(data.msg);
                Updater.showText(data.msg);
            }
        });
        ajax.setData(Updater.params());
        ajax.start();
    };
    Updater.install = function () {
        Feng.confirm('升级前会自动备份代码和数据库，执行期间请不要关闭页面。确认开始升级？', function () {
            var loading = layer.msg('正在升级，请勿关闭页面...', {
                icon: 16,
                shade: [0.18, '#000'],
                time: 0
            });
            $('#install-btn').prop('disabled', true);
            Updater.startProgress();
            var ajax = new $ax(Feng.ctxPath + '/SystemUpdate/install', function (data) {
                layer.close(loading);
                if (data.status === '00') {
                    Updater.stopProgress(true);
                    Feng.success(data.msg);
                    Updater.showHtml(Updater.renderInstall(data.data || {}));
                } else {
                    Updater.stopProgress(false);
                    Feng.error(data.msg);
                    Updater.showText(data.msg);
                    if (Updater.latest && Updater.latest.has_update) {
                        $('#install-btn').prop('disabled', false);
                    }
                }
            }, function () {
                layer.close(loading);
                Updater.stopProgress(false);
                Feng.error('请求失败');
                if (Updater.latest && Updater.latest.has_update) {
                    $('#install-btn').prop('disabled', false);
                }
            });
            ajax.setData(Updater.params());
            ajax.start();
        });
    };
    Updater.databaseCheck = function () {
        var ajax = new $ax(Feng.ctxPath + '/SystemUpdate/databaseCheck', function (data) {
            if (data.status === '00') {
                Updater.showHtml(Updater.renderDatabaseStatus(data.data || {}));
            } else {
                Feng.error(data.msg);
                Updater.showText(data.msg);
            }
        });
        ajax.start();
    };
    Updater.databaseRepair = function () {
        Feng.confirm('修复数据库会自动补齐缺失的数据表，不会删除已有数据。确认开始修复？', function () {
            var loading = layer.msg('正在检测并修复数据库结构...', {
                icon: 16,
                shade: [0.18, '#000'],
                time: 0
            });
            var ajax = new $ax(Feng.ctxPath + '/SystemUpdate/databaseRepair', function (data) {
                layer.close(loading);
                if (data.status === '00') {
                    Feng.success(data.msg);
                    Updater.showHtml(Updater.renderDatabaseRepair(data.data || {}));
                } else {
                    Feng.error(data.msg);
                    Updater.showText(data.msg);
                }
            }, function () {
                layer.close(loading);
                Feng.error('请求失败');
            });
            ajax.start();
        });
    };
    Updater.logs = function () {
        var ajax = new $ax(Feng.ctxPath + '/SystemUpdate/logs', function (data) {
            if (data.status === '00') {
                Updater.showHtml(Updater.renderLogs(data.data));
            } else {
                Feng.error(data.msg);
            }
        });
        ajax.start();
    };
    $(function () {
        Updater.check();
    });
</script>
{/block}
