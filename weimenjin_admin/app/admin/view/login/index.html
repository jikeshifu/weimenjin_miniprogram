<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{:config('xhadmin.site_title')}</title>
    <link rel="shortcut icon" href="__PUBLIC__/static/favicon.ico">
    <link href="__PUBLIC__/static/login_new/static/css/font-awesome.min.css" rel="stylesheet">
    <script src="__PUBLIC__/static/js/jquery.min.js?v=2.1.4"></script>
    <script src="__PUBLIC__/static/js/plugins/layer/layer.min.js"></script>
    <script src="__PUBLIC__/static/js/common/ajax-object.js"></script>
    <script src="__PUBLIC__/static/js/common/Feng.js"></script>
    <style>
        * { box-sizing: border-box; }
        html, body { width: 100%; min-height: 100%; margin: 0; }
        body {
            font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
            color: #ecfeff;
            background: #04131e;
            overflow-x: hidden;
        }
        .auth-page {
            position: relative;
            min-height: 100vh;
            display: grid;
            grid-template-columns: minmax(320px, 1fr) minmax(360px, 470px);
            gap: 48px;
            align-items: center;
            padding: 48px clamp(24px, 6vw, 96px);
            background:
                linear-gradient(120deg, rgba(2, 14, 25, .66), rgba(4, 32, 46, .36)),
                url("__PUBLIC__/static/login_new/static/picture/wmj-community-tech-login.webp") center/cover no-repeat;
            isolation: isolate;
        }
        .auth-page::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: -1;
            background:
                radial-gradient(circle at 20% 30%, rgba(34, 211, 238, .12), transparent 28%),
                radial-gradient(circle at 80% 70%, rgba(46, 204, 113, .1), transparent 30%),
                linear-gradient(90deg, rgba(125, 211, 252, .08) 1px, transparent 1px),
                linear-gradient(0deg, rgba(125, 211, 252, .06) 1px, transparent 1px);
            background-size: auto, auto, 72px 72px, 72px 72px;
        }
        .auth-page::after {
            content: "";
            position: absolute;
            inset: 0;
            z-index: -1;
            background:
                linear-gradient(135deg, transparent 0 18%, rgba(34, 211, 238, .18) 18.2%, transparent 18.6% 58%, rgba(46, 204, 113, .14) 58.2%, transparent 58.7%),
                linear-gradient(45deg, transparent 0 35%, rgba(125, 211, 252, .12) 35.2%, transparent 35.6%);
            opacity: .38;
        }
        .brand-panel { max-width: 720px; }
        .brand-panel h1 {
            margin: 0 0 18px;
            font-size: clamp(34px, 4vw, 58px);
            line-height: 1.08;
            font-weight: 800;
            letter-spacing: 0;
        }
        .brand-panel p {
            margin: 0;
            max-width: 560px;
            color: rgba(236, 254, 255, .74);
            font-size: 17px;
            line-height: 1.9;
        }
        .login-card {
            width: 100%;
            padding: 34px;
            color: #102030;
            border: 1px solid rgba(255, 255, 255, .78);
            background: linear-gradient(180deg, rgba(255, 255, 255, .96), rgba(240, 249, 255, .9));
            box-shadow: 0 28px 90px rgba(0, 0, 0, .28), inset 0 1px 0 rgba(255, 255, 255, .9);
            backdrop-filter: blur(16px);
        }
        .card-top {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: flex-start;
            margin-bottom: 28px;
        }
        .card-top h2 { margin: 0 0 8px; font-size: 28px; font-weight: 750; }
        .card-top p { margin: 0; color: #64748b; }
        .mode-link {
            white-space: nowrap;
            color: #0f766e;
            text-decoration: none;
            border: 1px solid rgba(20, 184, 166, .32);
            padding: 9px 12px;
            background: rgba(20, 184, 166, .08);
        }
        .field { margin-bottom: 18px; }
        .field label {
            display: block;
            margin-bottom: 8px;
            color: #475569;
            font-size: 13px;
        }
        .input-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            height: 48px;
            border: 1px solid rgba(15, 118, 110, .18);
            background: rgba(255, 255, 255, .82);
            padding: 0 14px;
        }
        .input-wrap i { color: #0f766e; width: 18px; text-align: center; }
        .input-wrap input {
            width: 100%;
            border: 0;
            outline: 0;
            background: transparent;
            color: #102030;
            font-size: 15px;
        }
        .input-wrap input::placeholder { color: #94a3b8; }
        .verify-row {
            display: grid;
            grid-template-columns: 1fr 132px;
            gap: 12px;
        }
        .verify-img {
            width: 132px;
            height: 48px;
            object-fit: cover;
            cursor: pointer;
            border: 1px solid rgba(15, 118, 110, .18);
            background: #fff;
        }
        .login-btn {
            width: 100%;
            height: 50px;
            border: 0;
            cursor: pointer;
            color: #04131e;
            font-size: 16px;
            font-weight: 800;
            background: linear-gradient(135deg, #5eead4, #22c55e);
            box-shadow: 0 16px 44px rgba(34, 197, 94, .24);
            transition: transform .18s ease, box-shadow .18s ease;
        }
        .login-btn:hover { transform: translateY(-1px); box-shadow: 0 20px 54px rgba(34, 197, 94, .3); }
        .login-tip {
            margin: 18px 0 0;
            color: #64748b;
            font-size: 13px;
            text-align: center;
        }
        .page-footer {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 20px;
            color: rgba(236, 254, 255, .54);
            text-align: center;
            font-size: 13px;
        }
        .page-footer a { color: rgba(236, 254, 255, .68); text-decoration: none; }
        .disclaimer-link {
            margin-left: 14px;
            color: #67e8f9 !important;
            cursor: pointer;
        }
        .disclaimer-mask {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 22px;
            z-index: 9999;
            background: rgba(1, 8, 14, .72);
            backdrop-filter: blur(10px);
        }
        .disclaimer-mask.active { display: flex; }
        .disclaimer-dialog {
            width: min(92vw, 680px);
            max-height: 82vh;
            overflow: auto;
            padding: 28px;
            border: 1px solid rgba(125, 211, 252, .28);
            background: linear-gradient(180deg, rgba(255, 255, 255, .98), rgba(240, 249, 255, .98));
            box-shadow: 0 28px 90px rgba(0, 0, 0, .45);
        }
        .disclaimer-dialog h3 { margin: 0 0 14px; color: #102030; font-size: 22px; }
        .disclaimer-dialog p,
        .disclaimer-text {
            margin: 0 0 12px;
            color: #334155;
            line-height: 1.8;
            font-size: 14px;
        }
        .disclaimer-close {
            width: 100%;
            height: 42px;
            margin-top: 8px;
            border: 0;
            cursor: pointer;
            color: #04131e;
            font-weight: 800;
            background: linear-gradient(135deg, #5eead4, #22c55e);
        }
        @media (max-width: 900px) {
            body { overflow: auto; }
            .auth-page {
                grid-template-columns: 1fr;
                padding: 34px 18px 72px;
            }
            .brand-panel { display: none; }
            .login-card { max-width: 460px; margin: 0 auto; padding: 28px 22px; }
        }
    </style>
</head>
<body>
<main class="auth-page">
    <section class="brand-panel">
        <h1>{:config('xhadmin.site_title')}</h1>
        <p>方便快捷的门禁管理系统。</p>
    </section>
    <section class="login-card">
        <div class="card-top">
            <div>
                <h2>账号登录</h2>
                <p>使用后台管理员账号进入系统</p>
            </div>
            <a class="mode-link" href="/admin/Login/indexQrCode">扫码登录</a>
        </div>
        <div class="field">
            <label>账号</label>
            <div class="input-wrap">
                <i class="fa fa-user"></i>
                <input name="username" id="username" type="text" placeholder="请输入账号" autocomplete="username">
            </div>
        </div>
        <div class="field">
            <label>密码</label>
            <div class="input-wrap">
                <i class="fa fa-lock"></i>
                <input name="password" id="password" type="password" placeholder="请输入登录密码" autocomplete="current-password">
            </div>
        </div>
        <div class="field">
            <label>验证码</label>
            <div class="verify-row">
                <div class="input-wrap">
                    <i class="fa fa-shield"></i>
                    <input name="verify" id="averfiy" type="text" placeholder="请输入验证码" autocomplete="off">
                </div>
                <img src="{:url('admin/Login/Verify')}" onclick="this.src='{:url('admin/Login/Verify')}?'+Math.random()" alt="点击刷新验证码" id="img" class="verify-img">
            </div>
        </div>
        <button id="submit" type="button" onclick="login()" class="login-btn">登录控制台</button>
        <p class="login-tip">支持回车提交，验证码点击图片可刷新</p>
    </section>
    <footer class="page-footer">
        &copy; <script>document.write(new Date().getFullYear())</script>
        <a href="javascript:void(0);">{:config('xhadmin.site_title')}</a>
        <a class="disclaimer-link" href="javascript:void(0);" onclick="showDisclaimer()">免责声明</a>
    </footer>
</main>
<div id="disclaimerModal" class="disclaimer-mask" onclick="hideDisclaimer(event)">
    <div class="disclaimer-dialog">
        <h3>免责声明</h3>
        <div class="disclaimer-text">{$disclaimerHtml|raw}</div>
        <button class="disclaimer-close" type="button" onclick="hideDisclaimer()">我已了解</button>
    </div>
</div>
<script>
    if (navigator.appName === 'Microsoft Internet Explorer') {
        if (navigator.userAgent.indexOf('MSIE 5.0') > 0 || navigator.userAgent.indexOf('MSIE 6.0') > 0 || navigator.userAgent.indexOf('MSIE 7.0') > 0) {
            alert('您使用的 IE 浏览器版本过低, 推荐使用 Chrome 浏览器或 IE8 及以上版本浏览器.');
        }
    }
    document.onkeydown = function(e) {
        var ev = document.all ? window.event : e;
        if (ev.keyCode === 13) {
            login();
        }
    };
    $('#username').focus();
    function showDisclaimer() {
        $('#disclaimerModal').addClass('active');
    }
    function hideDisclaimer(event) {
        if (!event || event.target.id === 'disclaimerModal') {
            $('#disclaimerModal').removeClass('active');
        }
    }
    function login() {
        var username = $('#username').val();
        var password = $('#password').val();
        var verify = $('#averfiy').val();
        if (!username || !password) {
            Feng.info('请输入用户名或者密码！');
            return false;
        }
        if (!verify) {
            Feng.info('请输入验证码！');
            return false;
        }
        $('#submit').prop('disabled', true).text('正在验证...');
        var ajax = new $ax("{:url('admin/Login/index')}", function(data) {
            if (1 === data.code) {
                Feng.success(data.msg);
                window.location.href = data.url;
            } else {
                $('#submit').prop('disabled', false).text('登录控制台');
                $('#img').attr('src', "{:url('admin/Login/Verify')}?=" + Math.random());
                Feng.error(data.msg);
            }
        }, function() {
            $('#submit').prop('disabled', false).text('登录控制台');
            Feng.error('请求失败');
        });
        ajax.set('username', username);
        ajax.set('password', password);
        ajax.set('verify', verify);
        ajax.start();
    }
</script>
</body>
</html>
